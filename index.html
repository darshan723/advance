<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For Anshika 💖</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at top, #7a001f, #3b000f);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Pacifico', cursive;
    }

    .container {
      text-align: center;
      z-index: 2;
      animation: fadeIn 2s ease;
    }

    h1 {
      color: #ff9ac4;
      font-size: 3.5em;
      text-shadow: 0 0 10px #ff4d88, 0 0 25px #ff1a66, 0 0 40px #ff66a3;
      animation: glow 2s infinite alternate, floatText 3s ease-in-out infinite;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #ff4d88, 0 0 20px #ff1a66; }
      to { text-shadow: 0 0 25px #ff80b3, 0 0 50px #ff3385; }
    }

    @keyframes floatText {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .click-box {
      margin-top: 40px;
      padding: 18px 40px;
      background: linear-gradient(45deg, #ff4d6d, #ff99c8);
      border-radius: 50px;
      cursor: pointer;
      font-size: 1.3em;
      color: white;
      box-shadow: 0 0 15px rgba(255, 77, 109, 0.8);
      transition: 0.3s;
    }

    .click-box:hover {
      transform: scale(1.15);
      box-shadow: 0 0 25px rgba(255,105,180,1);
    }

    .signature {
      position: fixed;
      bottom: 15px;
      width: 100%;
      text-align: center;
      font-size: 1em;
      color: #ffc1d9;
      opacity: 0.8;
      text-shadow: 0 0 8px rgba(255, 105, 180, 0.7);
    }

    .heart {
      position: absolute;
      font-size: 20px;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Click for the Magic ✨</h1>
  <div class="click-box" onclick="window.location.href='page2.html'">
    Click Here 💖
  </div>
</div>

<div class="signature">Surprise by Darshan</div>

<script>
function createHeart() {
  const heart = document.createElement('div');
  heart.classList.add('heart');
  heart.innerHTML = ['💖','💘','💝'][Math.floor(Math.random()*3)];
  heart.style.left = Math.random()*100 + 'vw';
  heart.style.animationDuration = (4 + Math.random()*4) + 's';
  heart.style.fontSize = (18 + Math.random()*30) + 'px';
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),8000);
}

setTimeout(()=>{
  setInterval(createHeart,300);
},1200);
</script>

</body>
</html>
